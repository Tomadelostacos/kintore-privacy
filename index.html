<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Privacy Policy – Kintore</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0d0d1f;
      color: #e0e0f0;
      line-height: 1.7;
      padding: 0 0 60px;
    }

    header {
      background: linear-gradient(135deg, #e94560, #4f9cf9);
      padding: 48px 24px 36px;
      text-align: center;
    }

    header .logo {
      font-size: 36px;
      font-weight: 900;
      letter-spacing: 6px;
      color: #fff;
      display: block;
      margin-bottom: 8px;
    }

    header p { font-size: 15px; color: rgba(255,255,255,0.8); }

    .lang-bar {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 8px;
      padding: 16px 24px;
      background: #13132a;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .lang-btn {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.5);
      border-radius: 8px;
      padding: 5px 12px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: all 0.15s;
    }

    .lang-btn.active {
      background: rgba(233,69,96,0.15);
      border-color: rgba(233,69,96,0.4);
      color: #e94560;
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
      padding: 0 24px;
    }

    .updated {
      text-align: center;
      font-size: 13px;
      color: rgba(255,255,255,0.35);
      padding: 20px 0 8px;
    }

    section {
      background: #1c1c2e;
      border-radius: 16px;
      padding: 24px 28px;
      margin-top: 20px;
      border: 1px solid rgba(255,255,255,0.06);
    }

    h2 {
      font-size: 17px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    h2 .icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    p { font-size: 15px; color: #b0b0cc; margin-bottom: 10px; }
    p:last-child { margin-bottom: 0; }

    ul {
      list-style: none;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    ul li {
      font-size: 15px;
      color: #b0b0cc;
      padding-left: 20px;
      position: relative;
    }

    ul li::before {
      content: '→';
      position: absolute;
      left: 0;
      color: #e94560;
      font-weight: 700;
    }

    .badge {
      display: inline-block;
      background: rgba(34,197,94,0.12);
      color: #22c55e;
      border: 1px solid rgba(34,197,94,0.2);
      border-radius: 6px;
      padding: 2px 8px;
      font-size: 12px;
      font-weight: 700;
      margin-left: 8px;
      vertical-align: middle;
    }

    footer {
      text-align: center;
      padding: 40px 24px 0;
      font-size: 13px;
      color: rgba(255,255,255,0.2);
    }

    em { font-style: italic; }
    a { color: #4f9cf9; text-decoration: none; }
  </style>
</head>

  </section>
</div>

function setLang(code) {
  const t = T[code];
  document.getElementById('header-sub').textContent = t.title;
  document.getElementById('updated').textContent = t.updated;
  document.getElementById('s1-title').textContent = t.s1.title;
  document.getElementById('s1-body').innerHTML = t.s1.body;
  document.getElementById('s2-title').textContent = t.s2.title;
  document.getElementById('s2-intro').innerHTML = t.s2.intro;
  document.getElementById('s2-list').innerHTML = t.s2.items.map(i => `<li>${i}</li>`).join('');
  document.getElementById('s2-footer').innerHTML = t.s2.footer;
  document.getElementById('s3-title').textContent = t.s3.title;
  document.getElementById('s3-list').innerHTML = t.s3.items.map(i => `<li>${i}</li>`).join('');
  document.getElementById('s4-title').textContent = t.s4.title;
  document.getElementById('s4-body1').innerHTML = t.s4.body1;
  document.getElementById('s4-body2').innerHTML = t.s4.body2;
  document.getElementById('s4-body3').innerHTML = t.s4.body3;
  document.getElementById('s5-title').textContent = t.s5.title;
  document.getElementById('s5-intro').innerHTML = t.s5.intro;
  document.getElementById('s5-list').innerHTML = t.s5.items.map(i => `<li>${i}</li>`).join('');
  document.getElementById('footer').textContent = t.footer;
  document.querySelectorAll('.lang-btn').forEach(b => {
    b.classList.toggle('active', b.textContent === code.toUpperCase());
  });
  document.documentElement.lang = code;
}

// Auto-detect browser language
const browserLang = navigator.language.slice(0, 2).toLowerCase();
const supported = ['fr', 'en', 'ja', 'es', 'de', 'ko', 'zh'];
setLang(supported.includes(browserLang) ? browserLang : 'en');
